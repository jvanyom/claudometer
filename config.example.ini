# Claude plan usage monitor configuration.
# Copy to ~/.config/claudometer/config.ini and edit.

[claudometer]

# Your claude.ai organization UUID. install.sh fills this in automatically by
# querying https://claude.ai/api/organizations with your sessionKey cookie.
# To override or pick a different org, edit this value (find it in the URL of
# https://claude.ai/api/organizations/<UUID>/usage in your browser DevTools).
org_id = REPLACE_WITH_YOUR_ORG_UUID

# Path to a file containing your claude.ai sessionKey cookie value on a
# single line. See README.md for how to extract it from your browser.
cookie_file = ~/.config/claudometer/sessionKey

# Comma-separated list of windows to monitor. Recognised:
#   five_hour    - the rolling ~5-hour session window
#   weekly       - the weekly plan cap
#   weekly_opus  - separate Opus weekly cap, if present in the response
windows = five_hour, weekly

# Comma-separated list of alert kinds to enable:
#   reset          - the window just reset
#   low_remaining  - remaining % fell to or below `low_remaining_pct`
#   burn_rate      - at current rate, will hit 0 before the reset time
alerts = reset, low_remaining, burn_rate

# Threshold for the "low remaining" alert (percent of quota still available).
# Default 20 means notify when only 20% (or less) is left.
low_remaining_pct = 20

# Burn-rate sensitivity (minutes).
burn_rate_min_history_min = 30
burn_rate_window_min = 60

# Keep readings younger than this (minutes) for burn-rate math.
history_retention_min = 120

# How often auth-failure notifications may repeat (hours).
auth_error_throttle_hours = 6

# HTTP timeout for the usage fetch (seconds).
http_timeout_sec = 15
